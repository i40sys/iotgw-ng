# gitleaks config for iotgw-ng (task-067.03 / 067.04, decision-014).
#
# The ONLY thing allowlisted is SOPS-encrypted ciphertext, matched by the
# `.enc.*` extension — NOT the secrets/ directory wholesale. This is deliberate:
# SOPS+age ciphertext (AES256_GCM) is safe to publish, but a stray PLAINTEXT file
# dropped into secrets/ (e.g. secrets/leak.env) must still trip the scan.
#
# NO literal secret VALUES are kept in this file (a public-repo leak: Google
# flagged a real Gemini key that was previously listed here). The known-bad
# rotated/decommissioned values live ENCRYPTED in
# secrets/decommissioned-secrets.enc.env and are checked by tools/verify.sh.
title = "iotgw-ng secret scan"

[extend]
# Start from the full gitleaks default ruleset (AWS keys, private keys, tokens…).
useDefault = true

[allowlist]
description = "SOPS ciphertext + audited non-secret false-positives"
# Matches secrets/*.enc.* (supabase.enc.env, traefik-tls.enc.yaml,
# decommissioned-secrets.enc.env, …). Extension-scoped on purpose: a plaintext
# sibling in secrets/ is NOT allowlisted.
paths = [
  '''.*\.enc\.(env|yaml|yml|json)$''',
]

# Placeholders / identifiers that are NOT secrets (task-067.03 audit).
regexes = [
  '''YOUR_ANON_KEY''',                            # docs/test curl placeholders
  # Bare UUIDs are identifiers, not secrets (e.g. Cosmian KMS key-IDs in
  # kms/pki-test/README.md). Allowlist the UUID shape so key-IDs don't trip.
  '''^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$''',
]
