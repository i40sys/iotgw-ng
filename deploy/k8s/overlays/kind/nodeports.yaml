# NodePort services mapped to host ports by deploy/kind/cluster.yaml so the
# platform is reachable on the same host ports as the compose stacks were.
apiVersion: v1
kind: Service
metadata:
  name: kestra-nodeport
  labels: { app.kubernetes.io/part-of: iotgw-ng }
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: kestra
  ports:
    - { name: http, port: 8080, targetPort: 8080, nodePort: 30808 }
---
apiVersion: v1
kind: Service
metadata:
  name: kms-nodeport
  labels: { app.kubernetes.io/part-of: iotgw-ng }
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: cosmian-kms
  ports:
    - { name: http, port: 9998, targetPort: 9998, nodePort: 30998 }
---
apiVersion: v1
kind: Service
metadata:
  name: supabase-db-nodeport
  labels: { app.kubernetes.io/part-of: iotgw-ng }
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: supabase-db
  ports:
    - { name: postgres, port: 5432, targetPort: 5432, nodePort: 30543 }
