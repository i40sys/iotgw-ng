apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NO global namespace transformer (decision-020): each base component sets its
# own namespace (kms/kestra/supabase-db/supabase-app/iotgw-ui); nodeports.yaml
# pins each NodePort to its target namespace explicitly.
# Local kind overlay: the validated core (KMS, Kestra) plus the
# StackGres-managed Supabase DB tier and the Supabase app tier
# (kong/auth/rest/meta/functions), exposed via NodePorts that the kind cluster
# maps to host ports (see deploy/kind/cluster.yaml).
# Secrets (supabase-env, kestra-env, supabase-db-initdb) are created out-of-band
# by deploy/kind/bootstrap.sh from the SOPS store.
# ROLLBACK: remove supabase-db-stackgres here, re-add supabase-db to base
# kustomization.yaml, and re-add the patch-db-listen-all.yaml patch below.
resources:
  - ../../base
  - ../../base/supabase-db-stackgres
  - ../../base/supabase-app
  - ../../base/iotgw-ui
  - nodeports.yaml

images:
  # Use the locally-built functions image (functions code baked in, not emptyDir)
  - name: supabase/edge-runtime:v1.74.0
    newName: iotgw-functions
    newTag: local

patches:
  # Remove the emptyDir volumes/volumeMounts so the baked-in image content at
  # /home/deno/functions/ is used (not shadowed by the placeholder emptyDir).
  - target:
      kind: Deployment
      name: functions
    patch: |-
      - op: remove
        path: /spec/template/spec/volumes
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts
  # NOTE: patch-db-listen-all.yaml (listen_addresses=* on the StatefulSet) is
  # intentionally dropped — StackGres manages listen_addresses via patroni and
  # the StatefulSet no longer exists in this overlay.
