apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: iotgw

# Local kind overlay: the validated core (KMS, Supabase DB, Kestra, whoami)
# exposed via NodePorts that the kind cluster maps to host ports
# (see deploy/kind/cluster.yaml). Secrets (supabase-env, kestra-env) are
# created out-of-band by deploy/kind/bootstrap.sh from the SOPS store.
resources:
  - ../../base
  - nodeports.yaml
