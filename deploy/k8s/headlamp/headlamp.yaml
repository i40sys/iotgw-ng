# Headlamp — in-cluster Kubernetes dashboard (https://headlamp.dev) for the
# iotgw-ng platform. Lives in its OWN dedicated `headlamp` namespace (not the
# iotgw app namespace) and is applied as a standalone kustomization, so the
# iotgw overlay's namespace transformer never pulls it into iotgw. Exposed
# through ingress-nginx, mirroring the whoami demo.
#
# Auth: Headlamp runs with `-in-cluster`; operators log in with a ServiceAccount
# bearer token. The `headlamp` SA below is bound (ClusterRoleBinding) to the
# built-in `cluster-admin` ClusterRole, so the dashboard has full read-write
# control of the cluster. Generate a login token with:
#   kubectl -n headlamp create token headlamp
# To restrict to read-only, point roleRef at a get/list/watch ClusterRole.
apiVersion: v1
kind: Namespace
metadata:
  name: headlamp
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/part-of: iotgw-ng
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/part-of: iotgw-ng
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/part-of: iotgw-ng
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp
    # namespace is set by the kustomize namespace transformer (headlamp)
    namespace: headlamp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/part-of: iotgw-ng
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: headlamp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: headlamp
        app.kubernetes.io/part-of: iotgw-ng
    spec:
      serviceAccountName: headlamp
      containers:
        - name: headlamp
          image: ghcr.io/headlamp-k8s/headlamp:v0.30.0
          args:
            - "-in-cluster"
            - "-plugins-dir=/headlamp/plugins"
          ports:
            - { name: http, containerPort: 4466 }
          livenessProbe:
            httpGet: { path: /, port: 4466 }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /, port: 4466 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: headlamp
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/part-of: iotgw-ng
spec:
  selector:
    app.kubernetes.io/name: headlamp
  ports:
    - { name: http, port: 80, targetPort: 4466 }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headlamp
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/part-of: iotgw-ng
spec:
  ingressClassName: nginx
  rules:
    - host: headlamp.wsl.ymbihq.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: headlamp
                port:
                  number: 80
