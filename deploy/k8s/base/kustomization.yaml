apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Validated-core platform tiers. There is NO global `namespace:` transformer and
# no shared `iotgw` Namespace (decision-020): each component kustomization below
# sets its OWN namespace (kms→kms, kestra→kestra). The full Supabase application
# data-plane (kong/auth/rest/meta/studio/functions/realtime/storage/imgproxy/
# analytics/supavisor/vector) is authored under supabase-app/ and pulled in by
# overlays that need it (see overlays/prod).
resources:
  - kms
  # supabase-db (StatefulSet) removed here; overlays include supabase-db-stackgres
  # instead. Keep base/supabase-db/ in the tree as the documented rollback path
  # (re-add this line and remove supabase-db-stackgres from overlays to revert).
  - kestra
