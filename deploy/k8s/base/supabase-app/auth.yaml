---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/part-of: iotgw-ng
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth
        app.kubernetes.io/part-of: iotgw-ng
    spec:
      containers:
        - name: auth
          image: supabase/gotrue:v2.189.0
          ports:
            - name: http
              containerPort: 9999
          env:
            - name: GOTRUE_API_HOST
              value: "0.0.0.0"
            - name: GOTRUE_API_PORT
              value: "9999"
            - name: API_EXTERNAL_URL
              value: "http://kong:8000"
            - name: GOTRUE_DB_DRIVER
              value: "postgres"
            - name: GOTRUE_PW
              valueFrom:
                secretKeyRef:
                  name: supabase-env
                  key: POSTGRES_PASSWORD
            - name: GOTRUE_DB_DATABASE_URL
              value: "postgres://supabase_auth_admin:$(GOTRUE_PW)@supabase-db:5432/postgres"
            - name: GOTRUE_SITE_URL
              value: "http://localhost:3000"
            - name: GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-env
                  key: JWT_SECRET
            - name: GOTRUE_JWT_EXP
              valueFrom:
                secretKeyRef:
                  name: supabase-env
                  key: JWT_EXPIRY
            - name: GOTRUE_JWT_DEFAULT_GROUP_NAME
              value: "authenticated"
            - name: GOTRUE_JWT_ADMIN_ROLES
              value: "service_role"
            - name: GOTRUE_JWT_AUD
              value: "authenticated"
            - name: GOTRUE_DISABLE_SIGNUP
              value: "false"
            - name: GOTRUE_MAILER_AUTOCONFIRM
              value: "true"
            - name: GOTRUE_EXTERNAL_EMAIL_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/part-of: iotgw-ng
spec:
  selector:
    app.kubernetes.io/name: auth
  ports:
    - name: http
      port: 9999
      targetPort: 9999
      protocol: TCP
