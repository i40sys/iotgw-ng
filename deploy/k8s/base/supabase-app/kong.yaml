---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-template
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/part-of: iotgw-ng
data:
  kong.yml: |
    _format_version: "2.1"
    _transform: true

    ###
    ### Consumers / Users
    ###
    consumers:
      - username: DASHBOARD
      - username: anon
        keyauth_credentials:
          - key: ${SUPABASE_ANON_KEY}
      - username: service_role
        keyauth_credentials:
          - key: ${SUPABASE_SERVICE_KEY}

    ###
    ### Access Control List
    ###
    acls:
      - consumer: anon
        group: anon
      - consumer: service_role
        group: admin

    ###
    ### Dashboard credentials
    ###
    basicauth_credentials:
      - consumer: DASHBOARD
        username: ${DASHBOARD_USERNAME}
        password: ${DASHBOARD_PASSWORD}

    ###
    ### API Routes
    ###
    services:
      ## Open Auth routes (no key required)
      - name: auth-v1-open
        url: http://auth:9999/verify
        routes:
          - name: auth-v1-open
            strip_path: true
            paths:
              - /auth/v1/verify
        plugins:
          - name: cors
      - name: auth-v1-open-callback
        url: http://auth:9999/callback
        routes:
          - name: auth-v1-open-callback
            strip_path: true
            paths:
              - /auth/v1/callback
        plugins:
          - name: cors
      - name: auth-v1-open-authorize
        url: http://auth:9999/authorize
        routes:
          - name: auth-v1-open-authorize
            strip_path: true
            paths:
              - /auth/v1/authorize
        plugins:
          - name: cors

      ## Secure Auth routes: /auth/v1/* -> http://auth:9999/*
      - name: auth-v1
        url: http://auth:9999/
        routes:
          - name: auth-v1-all
            strip_path: true
            paths:
              - /auth/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
                - anon

      ## Secure REST routes: /rest/v1/* -> http://rest:3000/*
      - name: rest-v1
        url: http://rest:3000/
        routes:
          - name: rest-v1-all
            strip_path: true
            paths:
              - /rest/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: true
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
                - anon

      ## Edge Functions routes: /functions/v1/* -> http://functions:9000/*
      - name: functions-v1
        url: http://functions:9000/
        routes:
          - name: functions-v1-all
            strip_path: true
            paths:
              - /functions/v1/
        plugins:
          - name: cors
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/part-of: iotgw-ng
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kong
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kong
        app.kubernetes.io/part-of: iotgw-ng
    spec:
      initContainers:
        - name: render-config
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - apk add --no-cache gettext && envsubst < /tpl/kong.yml > /shared/kong.yml
          env:
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-env
                  key: ANON_KEY
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-env
                  key: SERVICE_ROLE_KEY
            - name: DASHBOARD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: supabase-env
                  key: DASHBOARD_USERNAME
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-env
                  key: DASHBOARD_PASSWORD
          volumeMounts:
            - name: kong-template
              mountPath: /tpl
              readOnly: true
            - name: kong-config
              mountPath: /shared
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
      containers:
        - name: kong
          image: kong/kong:3.9.1
          ports:
            - name: proxy
              containerPort: 8000
            - name: proxy-ssl
              containerPort: 8443
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /shared/kong.yml
            - name: KONG_DNS_ORDER
              value: LAST,A,CNAME
            - name: KONG_PLUGINS
              value: request-transformer,cors,key-auth,acl,basic-auth
            - name: KONG_NGINX_PROXY_PROXY_BUFFER_SIZE
              value: 160k
            - name: KONG_NGINX_PROXY_PROXY_BUFFERS
              value: "64 160k"
          volumeMounts:
            - name: kong-config
              mountPath: /shared
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: kong-template
          configMap:
            name: kong-template
        - name: kong-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kong
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/part-of: iotgw-ng
spec:
  selector:
    app.kubernetes.io/name: kong
  ports:
    - name: proxy
      port: 8000
      targetPort: 8000
    - name: proxy-ssl
      port: 8443
      targetPort: 8443