apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: iotgw

# StackGres-managed Postgres tier (decision-018), replacing the supabase-db
# StatefulSet. Requires the StackGres operator (CRDs) installed in the cluster
# (deploy/kind/bootstrap.sh installs it) and two generated objects:
#   - ConfigMap supabase-initdb-sql  (generated below from the real *.sql)
#   - Secret    supabase-db-initdb   (generated by bootstrap.sh make_secrets:
#       90-secrets.sql = role passwords (== POSTGRES_PASSWORD) + jwt GUCs)
# backup.yaml is intentionally NOT included here (prod-only; see that file).
resources:
  - instanceprofile-pgconfig.yaml
  - sgscript.yaml
  - sgcluster.yaml

configMapGenerator:
  - name: supabase-initdb-sql
    files:
      - 00-roles.sql=sql/00-roles.sql
      - 98-webhooks.sql=sql/98-webhooks.sql

generatorOptions:
  # SGScript references the ConfigMap by a stable name (kustomize cannot rewrite
  # name refs inside a custom CRD), so the hash suffix must be disabled.
  disableNameSuffixHash: true
