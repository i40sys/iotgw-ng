# SGScript — the Supabase initdb run by StackGres as the cluster superuser
# before the app connects. Order matters:
#   1) 00-roles.sql        (inline-via-ConfigMap) — create the supabase roles
#      the vanilla StackGres image does not bake, + the `extensions` schema.
#   2) 98-webhooks.sql     (the REAL file, via ConfigMap) — pg_net + the
#      supabase_functions schema/trigger/event-trigger (authoritative; already
#      contains the net.http_* SECURITY DEFINER + ownership the spike rediscovered).
#   3) 90-secrets.sql      (Secret, created by bootstrap.sh from the SOPS store)
#      — sets role LOGIN passwords (== POSTGRES_PASSWORD) + the jwt GUCs.
# The ConfigMap (supabase-initdb-sql) is generated by kustomization.yaml from the
# real SQL files; the Secret (supabase-db-initdb) is generated by bootstrap.sh.
apiVersion: stackgres.io/v1
kind: SGScript
metadata:
  name: supabase-initdb
spec:
  managedVersions: true
  continueOnError: false
  scripts:
    - name: 00-roles
      scriptFrom:
        configMapKeyRef:
          name: supabase-initdb-sql
          key: 00-roles.sql
    - name: 98-webhooks
      scriptFrom:
        configMapKeyRef:
          name: supabase-initdb-sql
          key: 98-webhooks.sql
    - name: 90-secrets
      scriptFrom:
        secretKeyRef:
          name: supabase-db-initdb
          key: 90-secrets.sql
