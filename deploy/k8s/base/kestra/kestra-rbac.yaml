apiVersion: v1
kind: ServiceAccount
metadata:
  name: kestra
  labels:
    app.kubernetes.io/name: kestra
    app.kubernetes.io/part-of: iotgw-ng
---
# Allow kestra to create/watch/delete runner pods in the same namespace.
# Required by io.kestra.plugin.kubernetes.core.PodCreate (plugin-kubernetes v1.9.1)
# when run with in-cluster credentials (no `connection` block in the task YAML).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kestra-pod-runner
  labels:
    app.kubernetes.io/name: kestra
    app.kubernetes.io/part-of: iotgw-ng
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kestra-pod-runner
  labels:
    app.kubernetes.io/name: kestra
    app.kubernetes.io/part-of: iotgw-ng
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kestra-pod-runner
subjects:
  - kind: ServiceAccount
    name: kestra
    namespace: iotgw
