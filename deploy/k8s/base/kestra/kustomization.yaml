apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Kestra gets its own namespace (decision-020). The `namespace:` transformer also
# rewrites the RoleBinding ServiceAccount subject namespace to `kestra`.
namespace: kestra
resources:
  - namespace.yaml
  - postgres.yaml
  - kestra-rbac.yaml
  - kestra.yaml
