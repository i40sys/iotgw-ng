# whoami behind an Ingress — the k8s TLS-termination demo.
# A real ingress controller (ingress-nginx in the kind overlay; Traefik/Gateway
# API in prod) terminates TLS here, replacing the former compose-based PoC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  labels:
    app.kubernetes.io/name: whoami
    app.kubernetes.io/part-of: iotgw-ng
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: whoami
  template:
    metadata:
      labels:
        app.kubernetes.io/name: whoami
        app.kubernetes.io/part-of: iotgw-ng
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10
          ports:
            - { name: http, containerPort: 80 }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  labels:
    app.kubernetes.io/name: whoami
    app.kubernetes.io/part-of: iotgw-ng
spec:
  selector:
    app.kubernetes.io/name: whoami
  ports:
    - { name: http, port: 80, targetPort: 80 }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami
  labels:
    app.kubernetes.io/name: whoami
    app.kubernetes.io/part-of: iotgw-ng
spec:
  ingressClassName: nginx
  rules:
    - host: whoami.wsl.ymbihq.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami
                port:
                  number: 80
