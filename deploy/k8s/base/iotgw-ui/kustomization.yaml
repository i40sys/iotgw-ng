apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# iotgw-ui tier: React SPA frontend (nginx) + Fastify/tRPC backend.
# Backend wires to in-cluster Kong (:8000), Cosmian KMS (:9998), and Kestra
# via their ClusterIP Services. VITE_API_URL is baked into the frontend image
# at build time — the kind overlay builds against iotgw-ui-backend.wsl.ymbihq.local
# so the browser reaches the backend via ingress-nginx on host port 80.
# Images are kind-loaded locals (imagePullPolicy: Never); production overlays
# should override these with real registry references.
resources:
  - backend.yaml
  - frontend.yaml
