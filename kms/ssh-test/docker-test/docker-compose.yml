services:
  ssh-server:
    build:
      context: .
      dockerfile: Dockerfile.sshd
    container_name: ssh-test-server
    volumes:
      - ./authorized_keys:/home/testuser/.ssh/authorized_keys:ro
    networks:
      - ssh-test-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "22"]
      interval: 5s
      timeout: 3s
      retries: 3

  ssh-client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: ssh-test-client
    volumes:
      - ./keys:/home/testuser/.ssh/keys:ro
    networks:
      - ssh-test-net
    depends_on:
      ssh-server:
        condition: service_healthy
    stdin_open: true
    tty: true

networks:
  ssh-test-net:
    driver: bridge
