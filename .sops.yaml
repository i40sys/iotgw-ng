# SOPS creation rules for the iotgw-ng workspace.
# ---------------------------------------------------------------------------
# All secrets live encrypted under secrets/ (and as *.enc.* anywhere in the
# tree). They are encrypted to the workspace age recipient below. The matching
# PRIVATE key lives OUTSIDE the repo at ~/.config/sops/age/keys.txt and is
# never committed. See secrets/README.md for the full workflow.
#
# Rotate the recipient: add the new public key to `age:` (comma-separated),
# run `sops updatekeys secrets/<file>` for every encrypted file, then drop the
# old key once every consumer has the new private key.
# ---------------------------------------------------------------------------
creation_rules:
  # dotenv-format secrets (encrypt every value, keep keys/comments readable)
  - path_regex: \.enc\.env$
    input_type: dotenv
    age: age164v3rhd4yt4g4dqp6w9n2mn6k03xc5lfdyrxgpeywn45vzfkpstskuqqdt

  # YAML/JSON secrets (e.g. TLS material, k8s Secret manifests) — encrypt only
  # the leaf values so diffs stay reviewable.
  - path_regex: \.enc\.(yaml|yml|json)$
    encrypted_regex: ^(data|stringData|value|.*[Kk]ey|.*[Pp]assword|.*[Tt]oken|.*[Ss]ecret|.*PRIVATE.*)$
    age: age164v3rhd4yt4g4dqp6w9n2mn6k03xc5lfdyrxgpeywn45vzfkpstskuqqdt

  # Catch-all for anything explicitly placed under secrets/
  - path_regex: ^secrets/.*\.(yaml|yml|json)$
    age: age164v3rhd4yt4g4dqp6w9n2mn6k03xc5lfdyrxgpeywn45vzfkpstskuqqdt
