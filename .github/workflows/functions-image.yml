# Publishes ghcr.io/i40sys/iotgw-functions (Deno edge functions baked onto the
# supabase/edge-runtime base). Thin caller over reusable build-image.yml.
# Conventions: decision-021.
#
# CONTEXT IS supabase/volumes (NOT repo root, NOT supabase/) so the Dockerfile's
# `COPY --chown=deno:deno functions/ /home/deno/functions/` resolves to
# supabase/volumes/functions/.
#
# BUMPABLE BASE: the Dockerfile pins `supabase/edge-runtime:v1.74.0`. A runtime
# upgrade is a single tracked edit to Dockerfile.functions (never a silent
# `latest` pull).
name: functions-image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - supabase/volumes/functions/**
      - deploy/k8s/base/supabase-app/Dockerfile.functions
      - .github/workflows/functions-image.yml
      - .github/workflows/build-image.yml
  pull_request:
    paths:
      - supabase/volumes/functions/**
      - deploy/k8s/base/supabase-app/Dockerfile.functions
      - .github/workflows/functions-image.yml
      - .github/workflows/build-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  attestations: write

jobs:
  build:
    uses: ./.github/workflows/build-image.yml
    with:
      image-name: iotgw-functions
      context: supabase/volumes
      dockerfile: deploy/k8s/base/supabase-app/Dockerfile.functions
      push: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  smoke:
    name: smoke (runtime starts + functions baked in)
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Assert /home/deno/functions/ is populated in the published image
        env:
          REF: ghcr.io/i40sys/iotgw-functions@${{ needs.build.outputs.digest }}
        run: |
          docker pull "$REF"
          # The edge-runtime entrypoint expects a serve subcommand; here we only
          # assert the baked functions are present (non-empty dir), which proves
          # the COPY + context were correct and the image is usable.
          count="$(docker run --rm --entrypoint sh "$REF" -c 'ls -1 /home/deno/functions | wc -l')"
          echo "baked functions: $count"
          if [ "$count" -lt 1 ]; then
            echo "::error::/home/deno/functions/ is empty in the published image"; exit 1
          fi
