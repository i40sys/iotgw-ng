# Ongoing secret-scanning gate (task-067.04, decision-014). Runs the MIT gitleaks
# Go binary (v8.30.1 — license-free; NOT gitleaks-action@v2 which is Node20 EOL)
# on push + pull_request over FULL history, reusing the repo-root .gitleaks.toml
# allowlist so SOPS *.enc.* ciphertext does not trip it. A non-zero exit FAILS the
# job; configure this check as a REQUIRED status check on main.
#
# This is layer 2 of a 3-layer defense:
#   1. .pre-commit-config.yaml (local gitleaks hook, v8.30.1)
#   2. this CI gate (required status check)
#   3. GitHub native secret scanning + push protection (repo Settings > Security)
name: secret-scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # whole history, not just HEAD

      - name: Install gitleaks 8.30.1
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full history with the .enc.* allowlist
        run: |
          gitleaks detect \
            --source . \
            --log-opts="--all" \
            --redact \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks.sarif \
            || { echo "::error::gitleaks detected un-allowlisted secret(s) — see the log above"; exit 1; }
          echo "gitleaks: no un-allowlisted secrets found"
