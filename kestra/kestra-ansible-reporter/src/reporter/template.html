<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Execution Log | $execution_id</title>
    <style>
        body {
            font-family: "Menlo", "Consolas", "Liberation Mono", monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 1em;
        }
        .header-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .header-section h1 {
            margin: 0;
            flex-grow: 1;
        }
        .control-buttons {
            display: flex;
            gap: 8px;
        }
        .control-btn {
            background-color: #3a3a3a;
            border: 1px solid #555;
            color: #d4d4d4;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .control-btn:hover {
            background-color: #4a4a4a;
            border-color: #777;
        }
        .control-btn:active {
            background-color: #2a2a2a;
        }
        .log-container {
            width: 100%;
        }
        .log-line {
            display: flex;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 2px 0;
        }
        .log-timestamp {
            flex: 0 0 250px;
            color: #888;
            padding-right: 15px;
        }
        .log-message {
            flex: 1;
        }
        .task-header {
            cursor: pointer;
            font-weight: bold;
            border-radius: 3px;
            padding: 5px;
            transition: background-color 0.2s;
        }
        .task-header:hover {
            background-color: #3a3a3a;
        }
        .task-header .log-message::before {
            content: '▸ ';
            display: inline-block;
            transition: transform 0.2s;
        }
        .task-header.expanded .log-message::before {
            transform: rotate(90deg);
        }
        .task-content {
            display: none;
            padding-left: 20px;
            border-left: 2px solid #444;
            margin-left: 5px;
        }
        .ansible-play { font-weight: bold; color: #c586c0; }
        .ansible-task { color: #569cd6; }
        .ansible-ok { color: #4ec9b0; }
        .ansible-changed { color: #d7ba7d; }
        .ansible-fatal, .ansible-failed { font-weight: bold; color: #f44747; }
        .ansible-recap { font-weight: bold; color: #c586c0; }
        .ansible-default { color: #d4d4d4; }
    </style>
</head>
<body>
    <div class="header-section">
        <h1>Execution Log ID: $execution_id</h1>
        <div class="control-buttons">
            <button class="control-btn" onclick="expandAll()" title="Expand All Tasks">
                ⤢
            </button>
            <button class="control-btn" onclick="collapseAll()" title="Collapse All Tasks">
                ⤡
            </button>
        </div>
    </div>
    <div class="log-container">
        $log_blocks
    </div>
    <script>
        function toggle(element) {
            element.classList.toggle('expanded');
            const content = element.nextElementSibling;
            if (content.style.display === "block") {
                content.style.display = "none";
            } else {
                content.style.display = "block";
            }
        }

        function expandAll() {
            const taskHeaders = document.querySelectorAll('.task-header');
            taskHeaders.forEach(header => {
                if (!header.classList.contains('expanded')) {
                    header.classList.add('expanded');
                    const content = header.nextElementSibling;
                    if (content && content.classList.contains('task-content')) {
                        content.style.display = "block";
                    }
                }
            });
        }

        function collapseAll() {
            const taskHeaders = document.querySelectorAll('.task-header');
            taskHeaders.forEach(header => {
                if (header.classList.contains('expanded')) {
                    header.classList.remove('expanded');
                    const content = header.nextElementSibling;
                    if (content && content.classList.contains('task-content')) {
                        content.style.display = "none";
                    }
                }
            });
        }
    </script>
</body>
</html>
